name: Deploy Backend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [packages/backend/**]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install and build
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter backend build

      - name: Create deploy bundle
        run: |
          pnpm deploy --filter backend --prod --legacy /tmp/chess-backend
          cp -r packages/backend/dist /tmp/chess-backend/dist
          tar -czf /tmp/chess-backend.tar.gz -C /tmp chess-backend

      - name: Deploy
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_HOST_KEY: ${{ vars.VPS_HOST_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "$VPS_HOST_KEY" >> ~/.ssh/known_hosts
          scp /tmp/chess-backend.tar.gz root@"$VPS_HOST":/tmp/chess-backend.tar.gz
          ssh root@"$VPS_HOST" bash -s <<'REMOTE'
            systemctl stop chess-backend || true
            rm -rf /opt/chess-backend/dist /opt/chess-backend/node_modules /opt/chess-backend/package.json
            mkdir -p /opt/chess-backend
            tar -xzf /tmp/chess-backend.tar.gz -C /opt --no-same-owner
            rm /tmp/chess-backend.tar.gz
            systemctl start chess-backend
          REMOTE
